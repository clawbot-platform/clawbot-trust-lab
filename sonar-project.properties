sonar.organization=clawbot-platform
sonar.projectKey=clawbot-platform_clawbot-trust-lab
sonar.projectName=clawbot-trust-lab
sonar.host.url=https://sonarcloud.io

sonar.sources=cmd,internal,web/src
sonar.tests=internal,web/src,web/tests
sonar.exclusions=**/*_test.go,web/src/**/*.test.ts,web/src/**/*.test.tsx,web/tests/**,reports/**,phase9-validation-output/**,web/src/test/**
sonar.test.inclusions=**/*_test.go,web/src/**/*.test.ts,web/src/**/*.test.tsx,web/tests/**/*.spec.ts,web/tests/**/*.spec.tsx

sonar.go.coverage.reportPaths=coverage.out
sonar.javascript.lcov.reportPaths=web/coverage/lcov.info

sonar.links.homepage=https://github.com/clawbot-platform/clawbot-trust-lab
sonar.links.ci=https://github.com/clawbot-platform/clawbot-trust-lab/actions
sonar.links.scm=https://github.com/clawbot-platform/clawbot-trust-lab
sonar.links.issue=https://github.com/clawbot-platform/clawbot-trust-lab/issues
