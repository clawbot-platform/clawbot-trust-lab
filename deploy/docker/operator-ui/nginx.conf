server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://trust-lab:8090;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /healthz {
    proxy_pass http://trust-lab:8090/healthz;
  }

  location = /readyz {
    proxy_pass http://trust-lab:8090/readyz;
  }

  location = /version {
    proxy_pass http://trust-lab:8090/version;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
